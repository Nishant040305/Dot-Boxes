<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots & Boxes — Play vs AI</title>
    <meta name="description" content="Play Dots and Boxes against powerful AI agents including AlphaZero">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        /* ═══════════════════════════════════════════════════
           DESIGN SYSTEM
           ═══════════════════════════════════════════════════ */
        :root {
            --bg-primary: #06060e;
            --bg-secondary: #0c0c18;
            --bg-card: #111125;
            --bg-card-hover: #16163a;
            --bg-surface: #1a1a3e;
            --border: #22224a;
            --border-hover: #33336a;
            --border-glow: rgba(99, 102, 241, 0.4);
            --text-primary: #e8e8f8;
            --text-secondary: #9090b8;
            --text-muted: #606088;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --accent-strong: rgba(99, 102, 241, 0.5);
            --pink: #ec4899;
            --pink-light: #f472b6;
            --pink-glow: rgba(236, 72, 153, 0.2);
            --p1-color: #6366f1;
            --p1-fill: rgba(99, 102, 241, 0.12);
            --p1-glow: rgba(99, 102, 241, 0.35);
            --p2-color: #ec4899;
            --p2-fill: rgba(236, 72, 153, 0.12);
            --p2-glow: rgba(236, 72, 153, 0.35);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gold: #fbbf24;
            --dot: #7070a8;
            --edge-inactive: rgba(100, 100, 160, 0.15);
            --edge-hover: rgba(255, 255, 255, 0.3);
            --edge-active: #d0d0f0;
            --edge-new: #fbbf24;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow-accent: 0 0 30px rgba(99, 102, 241, 0.15);
            --shadow-glow-pink: 0 0 30px rgba(236, 72, 153, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 10%, rgba(99, 102, 241, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 90%, rgba(236, 72, 153, 0.04) 0%, transparent 55%),
                radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.02) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .app {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        /* ═══════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════ */
        .header {
            text-align: center;
            padding: 28px 0 20px;
        }

        .header h1 {
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--pink-light) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: headerShimmer 6s ease-in-out infinite;
            background-size: 200% 200%;
        }

        @keyframes headerShimmer {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .header-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 6px;
            font-weight: 400;
        }

        /* ═══════════════════════════════════════════════════
           STATE SCREENS
           ═══════════════════════════════════════════════════ */

        /* ── Setup Screen ── */
        .setup-screen {
            max-width: 680px;
            margin: 0 auto;
        }

        .setup-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 32px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .setup-card:hover {
            border-color: var(--border-hover);
        }

        .setup-card-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setup-card-title .icon {
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }

        /* Agent grid */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .agent-option {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .agent-option:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow-accent);
        }

        .agent-option.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(99, 102, 241, 0.02));
            box-shadow: 0 0 24px rgba(99, 102, 241, 0.12);
        }

        .agent-option.selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 0.75rem;
            color: var(--accent-light);
            font-weight: 700;
        }

        .agent-name {
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .agent-desc {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .agent-difficulty {
            display: flex;
            gap: 2px;
            margin-top: 6px;
        }

        .diff-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.2s;
        }

        .diff-dot.filled {
            background: var(--accent);
        }

        .diff-dot.filled.high {
            background: var(--pink);
        }

        /* Board size selector */
        .size-selector {
            display: flex;
            gap: 10px;
        }

        .size-btn {
            flex: 1;
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .size-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .size-btn.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(99, 102, 241, 0.03));
            color: var(--accent-light);
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.1);
        }

        /* Player order */
        .order-selector {
            display: flex;
            gap: 10px;
        }

        .order-btn {
            flex: 1;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .order-btn:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .order-btn.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(99, 102, 241, 0.03));
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.1);
        }

        .order-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .order-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Start button */
        .start-btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .start-btn:hover::after {
            opacity: 1;
        }

        /* ═══════════════════════════════════════════════════
           GAME SCREEN LAYOUT
           ═══════════════════════════════════════════════════ */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .setup-screen.hidden {
            display: none;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 960px) {
            .game-layout {
                grid-template-columns: 1fr;
            }
        }

        /* ── Top bar ── */
        .game-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .turn-indicator {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 30px;
            transition: all 0.4s ease;
        }

        .turn-indicator.your-turn {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        .turn-indicator.ai-turn {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(245, 158, 11, 0.04));
            border: 1px solid rgba(245, 158, 11, 0.25);
            color: var(--warning);
        }

        .turn-indicator.game-over-indicator {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(236, 72, 153, 0.08));
            border: 1px solid rgba(99, 102, 241, 0.25);
            color: var(--accent-light);
        }

        @keyframes pulseGlow {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(16, 185, 129, 0.1);
            }

            50% {
                box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            }
        }

        /* ── Scoreboard ── */
        .scoreboard {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .score-card {
            flex: 1;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .score-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .score-card.p1 {
            background: var(--p1-fill);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .score-card.p2 {
            background: var(--p2-fill);
            border-color: rgba(236, 72, 153, 0.2);
        }

        .score-card.active-turn {
            box-shadow: var(--shadow-glow-accent);
        }

        .score-card.active-turn.p2 {
            box-shadow: var(--shadow-glow-pink);
        }

        .score-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .score-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            transition: transform 0.3s ease;
        }

        .score-card.p1 .score-value {
            color: var(--accent-light);
        }

        .score-card.p2 .score-value {
            color: var(--pink-light);
        }

        .score-value.bump {
            animation: scoreBump 0.4s ease;
        }

        @keyframes scoreBump {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.25);
            }

            100% {
                transform: scale(1);
            }
        }

        /* ── Board area ── */
        .board-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 400px;
        }

        #game-board {
            display: inline-grid;
            gap: 0;
            position: relative;
        }

        /* Dots */
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--dot);
            position: relative;
            z-index: 5;
            box-shadow: 0 0 8px rgba(112, 112, 168, 0.3);
        }

        /* Edges */
        .edge {
            position: relative;
            cursor: pointer;
            z-index: 3;
            transition: all 0.2s ease;
        }

        .edge-h {
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edge-v {
            width: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edge-line {
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .edge-h .edge-line {
            width: 100%;
            height: 4px;
            background: var(--edge-inactive);
        }

        .edge-v .edge-line {
            width: 4px;
            height: 100%;
            background: var(--edge-inactive);
        }

        .edge:not(.placed):not(.disabled):hover .edge-line {
            background: var(--edge-hover);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
        }

        .edge.placed .edge-line {
            background: var(--edge-active);
            box-shadow: 0 0 6px rgba(208, 208, 240, 0.2);
        }

        .edge.placed.p1 .edge-line {
            background: var(--p1-color);
            box-shadow: 0 0 10px var(--p1-glow);
        }

        .edge.placed.p2 .edge-line {
            background: var(--p2-color);
            box-shadow: 0 0 10px var(--p2-glow);
        }

        .edge.last-move .edge-line {
            background: var(--edge-new) !important;
            box-shadow: 0 0 16px rgba(251, 191, 36, 0.4) !important;
            animation: edgePulse 1.5s ease-in-out;
        }

        @keyframes edgePulse {
            0% {
                box-shadow: 0 0 20px rgba(251, 191, 36, 0.6);
            }

            100% {
                box-shadow: 0 0 16px rgba(251, 191, 36, 0.4);
            }
        }

        .edge.disabled {
            cursor: default;
            pointer-events: none;
        }

        /* Boxes (fill cells) */
        .box-cell {
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .box-cell.claimed {
            animation: boxPop 0.5s ease;
        }

        .box-cell.p1-box {
            background: var(--p1-fill);
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .box-cell.p2-box {
            background: var(--p2-fill);
            border: 1px solid rgba(236, 72, 153, 0.15);
        }

        .box-cell .box-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            opacity: 0.7;
        }

        .box-cell.p1-box .box-label {
            color: var(--accent-light);
        }

        .box-cell.p2-box .box-label {
            color: var(--pink-light);
        }

        @keyframes boxPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            60% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── Sidebar ── */
        .sidebar-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 16px;
        }

        .sidebar-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* Move log */
        .move-log {
            max-height: 420px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .move-log::-webkit-scrollbar {
            width: 3px;
        }

        .move-log::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: var(--radius-sm);
            margin-bottom: 3px;
            font-size: 0.78rem;
            transition: background 0.2s;
        }

        .log-entry:hover {
            background: var(--bg-surface);
        }

        .log-entry.latest {
            background: rgba(251, 191, 36, 0.06);
        }

        .log-entry.p1-entry {
            border-left: 3px solid var(--p1-color);
        }

        .log-entry.p2-entry {
            border-left: 3px solid var(--p2-color);
        }

        .log-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            min-width: 20px;
        }

        .log-text {
            flex: 1;
            color: var(--text-secondary);
        }

        .log-text strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .log-badge {
            font-size: 0.62rem;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 700;
        }

        .log-badge.box-badge {
            background: rgba(16, 185, 129, 0.12);
            color: var(--success);
        }

        .log-badge.time-badge {
            background: rgba(136, 136, 160, 0.08);
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Game info mini stats */
        .mini-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mini-stat {
            padding: 10px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            text-align: center;
        }

        .mini-stat-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .mini-stat-label {
            font-size: 0.62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ── Game Over Overlay ── */
        .game-over-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(6, 6, 14, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .game-over-overlay.show {
            display: flex;
            animation: overlayIn 0.4s ease;
        }

        @keyframes overlayIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .game-over-modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            animation: modalPop 0.5s ease;
            box-shadow: var(--shadow-lg);
        }

        @keyframes modalPop {
            0% {
                transform: scale(0.85) translateY(20px);
                opacity: 0;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .game-over-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .game-over-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .game-over-title.win {
            color: var(--success);
        }

        .game-over-title.lose {
            color: var(--danger);
        }

        .game-over-title.draw {
            color: var(--warning);
        }

        .game-over-score {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .game-over-actions {
            display: flex;
            gap: 10px;
        }

        .go-btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        .go-btn.primary {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            border: none;
            color: #fff;
        }

        .go-btn.primary:hover {
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .go-btn.secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .go-btn.secondary:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* ── Toast / status ── */
        .status-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 10px 24px;
            border-radius: 30px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 500;
            z-index: 200;
            transition: transform 0.4s ease, opacity 0.4s;
            opacity: 0;
            pointer-events: none;
        }

        .status-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .status-toast.error {
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        /* Connection indicator */
        .conn-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            transition: background 0.3s;
        }

        .conn-dot.connected {
            background: var(--success);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
        }

        .conn-dot.disconnected {
            background: var(--danger);
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <h1>Dots & Boxes</h1>
            <p class="header-sub">
                <span class="conn-dot disconnected" id="conn-dot"></span>
                Play against powerful AI agents
            </p>
        </header>

        <!-- ═══════════════ SETUP SCREEN ═══════════════ -->
        <div class="setup-screen" id="setup-screen">
            <!-- Agent Selection -->
            <div class="setup-card">
                <div class="setup-card-title">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                        <line x1="9" y1="9" x2="9.01" y2="9" />
                        <line x1="15" y1="9" x2="15.01" y2="9" />
                    </svg>
                    Choose Your Opponent
                </div>
                <div class="agent-grid" id="agent-grid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Board Size -->
            <div class="setup-card">
                <div class="setup-card-title">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <line x1="3" y1="9" x2="21" y2="9" />
                        <line x1="3" y1="15" x2="21" y2="15" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                        <line x1="15" y1="3" x2="15" y2="21" />
                    </svg>
                    Board Size
                </div>
                <div class="size-selector" id="size-selector">
                    <button class="size-btn" data-size="2">2×2</button>
                    <button class="size-btn selected" data-size="3">3×3</button>
                    <button class="size-btn" data-size="4">4×4</button>
                    <button class="size-btn" data-size="5">5×5</button>
                    <div class="size-btn custom-size-box cursor-text" style="display: flex; padding: 0; align-items: stretch; justify-content: center; cursor: text; flex: 1.2;">
                        <input type="number" id="custom-rows" class="size-input no-spin" style="width: 100%; min-width: 20px; background: transparent; border: none; outline: none; color: var(--text-primary); text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 1rem;" placeholder="R" min="2" max="15">
                        <span style="display: flex; align-items: center; color: var(--text-muted); font-size: 0.8rem; pointer-events: none;">×</span>
                        <input type="number" id="custom-cols" class="size-input no-spin" style="width: 100%; min-width: 20px; background: transparent; border: none; outline: none; color: var(--text-primary); text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 1rem;" placeholder="C" min="2" max="15">
                    </div>
                    <style>
                        .no-spin::-webkit-inner-spin-button, 
                        .no-spin::-webkit-outer-spin-button { 
                            -webkit-appearance: none; 
                            margin: 0; 
                        }
                        .no-spin {
                            -moz-appearance: textfield;
                        }
                        .custom-size-box:focus-within {
                            border-color: var(--accent);
                            box-shadow: 0 0 16px rgba(99, 102, 241, 0.1);
                        }
                    </style>
                </div>
            </div>

            <!-- Player Order -->
            <div class="setup-card">
                <div class="setup-card-title">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="8.5" cy="7" r="4" />
                        <polyline points="17 11 19 13 23 9" />
                    </svg>
                    Play Order
                </div>
                <div class="order-selector">
                    <button class="order-btn selected" data-player="1" onclick="selectOrder(1)">
                        <div class="order-label">Go First</div>
                        <div class="order-sub">You are Player 1 (indigo)</div>
                    </button>
                    <button class="order-btn" data-player="2" onclick="selectOrder(2)">
                        <div class="order-label">Go Second</div>
                        <div class="order-sub">You are Player 2 (pink)</div>
                    </button>
                </div>
            </div>

            <!-- Start -->
            <button class="start-btn" id="start-btn" onclick="startGame()">
                ▶ Start Game
            </button>
        </div>

        <!-- ═══════════════ GAME SCREEN ═══════════════ -->
        <div class="game-screen" id="game-screen">
            <!-- Top bar -->
            <div class="game-top-bar">
                <button class="back-btn" onclick="backToSetup()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                    New Game
                </button>
                <div class="turn-indicator your-turn" id="turn-indicator">Your Turn</div>
            </div>

            <div class="game-layout">
                <!-- Left: Board -->
                <div>
                    <div class="scoreboard">
                        <div class="score-card p1" id="score-card-p1">
                            <div class="score-label" id="p1-label">Player 1 (You)</div>
                            <div class="score-value" id="score-p1">0</div>
                        </div>
                        <div class="score-card p2" id="score-card-p2">
                            <div class="score-label" id="p2-label">Player 2 (AI)</div>
                            <div class="score-value" id="score-p2">0</div>
                        </div>
                    </div>

                    <div class="board-card">
                        <div id="game-board"></div>
                    </div>
                </div>

                <!-- Right: Sidebar -->
                <div>
                    <!-- Game info -->
                    <div class="sidebar-card">
                        <div class="sidebar-title">Game Info</div>
                        <div class="mini-stats">
                            <div class="mini-stat">
                                <div class="mini-stat-val" id="stat-board-size">3×3</div>
                                <div class="mini-stat-label">Board</div>
                            </div>
                            <div class="mini-stat">
                                <div class="mini-stat-val" id="stat-moves-made">0</div>
                                <div class="mini-stat-label">Moves</div>
                            </div>
                            <div class="mini-stat">
                                <div class="mini-stat-val" id="stat-agent">Greedy</div>
                                <div class="mini-stat-label">Opponent</div>
                            </div>
                            <div class="mini-stat">
                                <div class="mini-stat-val" id="stat-remaining">—</div>
                                <div class="mini-stat-label">Edges Left</div>
                            </div>
                        </div>
                    </div>

                    <!-- Move log -->
                    <div class="sidebar-card">
                        <div class="sidebar-title">Move History</div>
                        <div class="move-log" id="move-log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="game-over-overlay" id="game-over-overlay">
        <div class="game-over-modal">
            <div class="game-over-icon" id="go-icon">🎉</div>
            <div class="game-over-title win" id="go-title">You Win!</div>
            <div class="game-over-score" id="go-score">9 – 0</div>
            <div class="game-over-actions">
                <button class="go-btn secondary" onclick="backToSetup()">Change Settings</button>
                <button class="go-btn primary" onclick="rematch()">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Status Toast -->
    <div class="status-toast" id="status-toast"></div>

    <!-- ═══════════════ JAVASCRIPT ═══════════════ -->
    <script>
        // ──────────────────────────────────────────────
        //  STATE
        // ──────────────────────────────────────────────
        let socket = null;
        let agents = [];
        let selectedAgent = null;
        let selectedSize = 3;
        let selectedPlayer = 1;
        let gameActive = false;
        let boardSize = 3;
        let humanPlayer = 1;
        let moveCount = 0;
        let lastMoveRC = null;
        let previousScores = [0, 0];

        const CELL_SIZE = 60;
        const DOT_SIZE = 14;

        // ──────────────────────────────────────────────
        //  SOCKET CONNECTION
        // ──────────────────────────────────────────────
        function connectSocket() {
            socket = io();

            socket.on('connect', () => {
                document.getElementById('conn-dot').className = 'conn-dot connected';
            });

            socket.on('disconnect', () => {
                document.getElementById('conn-dot').className = 'conn-dot disconnected';
            });

            socket.on('agents_list', (data) => {
                agents = data;
                buildAgentGrid();
            });

            socket.on('game_started', (data) => {
                onGameStarted(data);
            });

            socket.on('state_update', (data) => {
                onStateUpdate(data);
            });

            socket.on('game_over', (data) => {
                onGameOver(data);
            });

            socket.on('error', (data) => {
                showToast(data.message, true);
            });
        }

        // ──────────────────────────────────────────────
        //  SETUP SCREEN
        // ──────────────────────────────────────────────
        function buildAgentGrid() {
            const grid = document.getElementById('agent-grid');
            grid.innerHTML = '';

            agents.forEach((agent, idx) => {
                const div = document.createElement('div');
                div.className = 'agent-option' + (idx === 1 ? ' selected' : '');
                if (idx === 1) selectedAgent = agent;

                const maxDiff = 10;
                let diffDots = '';
                for (let i = 0; i < maxDiff; i++) {
                    const cls = i < agent.difficulty
                        ? (agent.difficulty >= 7 ? 'diff-dot filled high' : 'diff-dot filled')
                        : 'diff-dot';
                    diffDots += `<div class="${cls}"></div>`;
                }

                div.innerHTML = `
                <div class="agent-name">${agent.name}</div>
                <div class="agent-desc">${agent.description}</div>
                <div class="agent-difficulty">${diffDots}</div>
            `;

                div.onclick = () => {
                    document.querySelectorAll('.agent-option').forEach(e => e.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedAgent = agent;
                };

                grid.appendChild(div);
            });
        }

        // Size selector
        document.querySelectorAll('.size-btn:not(.custom-size-box)').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                
                let r = btn.dataset.rows ? parseInt(btn.dataset.rows) : parseInt(btn.dataset.size);
                let c = btn.dataset.cols ? parseInt(btn.dataset.cols) : parseInt(btn.dataset.size);
                
                selectedSize = [r, c];
                
                const cr = document.getElementById('custom-rows');
                const cc = document.getElementById('custom-cols');
                if (cr) cr.value = '';
                if (cc) cc.value = '';
            });
        });

        function handleCustomSize() {
            const cr = document.getElementById('custom-rows').value;
            const cc = document.getElementById('custom-cols').value;
            if (cr && cc) {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                document.querySelector('.custom-size-box').classList.add('selected');
                let r = parseInt(cr);
                let c = parseInt(cc);
                if (r < 2) r = 2;
                if (r > 15) r = 15;
                if (c < 2) c = 2;
                if (c > 15) c = 15;
                selectedSize = [r, c];
            }
        }

        const crInput = document.getElementById('custom-rows');
        const ccInput = document.getElementById('custom-cols');
        if (crInput) crInput.addEventListener('input', handleCustomSize);
        if (ccInput) ccInput.addEventListener('input', handleCustomSize);

        function selectOrder(player) {
            selectedPlayer = player;
            document.querySelectorAll('.order-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector(`.order-btn[data-player="${player}"]`).classList.add('selected');
        }

        // ──────────────────────────────────────────────
        //  GAME ACTIONS
        // ──────────────────────────────────────────────
        function startGame() {
            if (!selectedAgent) {
                showToast('Please select an opponent', true);
                return;
            }

            // Ensure we have an array for size
            let boardSizeArg = selectedSize;
            if (!Array.isArray(boardSizeArg)) {
                boardSizeArg = [selectedSize, selectedSize];
            }

            socket.emit('new_game', {
                agent_spec: selectedAgent.spec,
                board_size: boardSizeArg,
                human_player: selectedPlayer,
                env_type: 'classic',  // Auto fallbacks will happen on server if required
            });
        }

        function backToSetup() {
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('game-over-overlay').classList.remove('show');
            gameActive = false;
        }

        function rematch() {
            document.getElementById('game-over-overlay').classList.remove('show');
            startGame();
        }

        // ──────────────────────────────────────────────
        //  GAME EVENT HANDLERS
        // ──────────────────────────────────────────────
        function onGameStarted(data) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('game-over-overlay').classList.remove('show');

            boardSize = data.board_size;
            humanPlayer = data.human_player;
            gameActive = true;
            moveCount = 0;
            lastMoveRC = null;
            previousScores = [0, 0];

            // Labels
            const p1Label = humanPlayer === 1 ? 'You' : data.agent_name;
            const p2Label = humanPlayer === 2 ? 'You' : data.agent_name;
            document.getElementById('p1-label').textContent = `Player 1 (${p1Label})`;
            document.getElementById('p2-label').textContent = `Player 2 (${p2Label})`;

            // Stats
            document.getElementById('stat-board-size').textContent = `${boardSize[0]}×${boardSize[1]}`;
            document.getElementById('stat-moves-made').textContent = '0';
            document.getElementById('stat-agent').textContent = data.agent_name;
            const totalEdges = boardSize[0] * (boardSize[1] + 1) + boardSize[1] * (boardSize[0] + 1);
            document.getElementById('stat-remaining').textContent = totalEdges;

            // Clear log
            document.getElementById('move-log').innerHTML = '';

            buildBoard(data);
            updateTurnIndicator(data);
        }

        function onStateUpdate(data) {
            moveCount++;

            // Score bump animation
            if (data.score[0] > previousScores[0]) {
                const el = document.getElementById('score-p1');
                el.classList.remove('bump');
                void el.offsetWidth;
                el.classList.add('bump');
            }
            if (data.score[1] > previousScores[1]) {
                const el = document.getElementById('score-p2');
                el.classList.remove('bump');
                void el.offsetWidth;
                el.classList.add('bump');
            }
            previousScores = [...data.score];

            lastMoveRC = data.last_move ? { row: data.last_move.row, col: data.last_move.col } : null;

            updateBoard(data);
            updateScores(data);
            updateTurnIndicator(data);
            addMoveLogEntry(data.last_move);

            // Stats
            document.getElementById('stat-moves-made').textContent = moveCount;
            const totalEdges = boardSize[0] * (boardSize[1] + 1) + boardSize[1] * (boardSize[0] + 1);
            const placedEdges = countPlacedEdges(data);
            document.getElementById('stat-remaining').textContent = totalEdges - placedEdges;
        }

        function onGameOver(data) {
            gameActive = false;

            const yourScore = data.human_player === 1 ? data.score[0] : data.score[1];
            const oppScore = data.human_player === 1 ? data.score[1] : data.score[0];

            const overlay = document.getElementById('game-over-overlay');
            const icon = document.getElementById('go-icon');
            const title = document.getElementById('go-title');
            const score = document.getElementById('go-score');

            if (yourScore > oppScore) {
                icon.textContent = '🎉';
                title.textContent = 'You Win!';
                title.className = 'game-over-title win';
            } else if (oppScore > yourScore) {
                icon.textContent = '😔';
                title.textContent = 'You Lost';
                title.className = 'game-over-title lose';
            } else {
                icon.textContent = '🤝';
                title.textContent = "It's a Draw!";
                title.className = 'game-over-title draw';
            }

            score.textContent = `${data.score[0]} – ${data.score[1]}`;

            // Show turn indicator as game over
            const ti = document.getElementById('turn-indicator');
            ti.className = 'turn-indicator game-over-indicator';
            ti.textContent = 'Game Over';

            setTimeout(() => overlay.classList.add('show'), 600);
        }

        // ──────────────────────────────────────────────
        //  BOARD RENDERING
        // ──────────────────────────────────────────────
        function buildBoard(data) {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            const M = data.board_size[0]; // rows
            const N = data.board_size[1]; // cols
            const gridRows = 2 * M + 1;
            const gridCols = 2 * N + 1;

            board.style.gridTemplateColumns = buildGridTemplate(N);
            board.style.gridTemplateRows = buildGridTemplate(M);
            board.style.display = 'grid';

            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    const el = document.createElement('div');

                    if (r % 2 === 0 && c % 2 === 0) {
                        // DOT
                        el.className = 'dot';
                    } else if (r % 2 === 0 && c % 2 === 1) {
                        // HORIZONTAL EDGE
                        el.className = 'edge edge-h';
                        el.dataset.row = r;
                        el.dataset.col = c;
                        el.innerHTML = '<div class="edge-line"></div>';
                        el.onclick = () => onEdgeClick(r, c);

                        const hi = r / 2;
                        const hj = (c - 1) / 2;
                        if (data.horizontal_edges[hi] && data.horizontal_edges[hi][hj]) {
                            el.classList.add('placed');
                        }
                    } else if (r % 2 === 1 && c % 2 === 0) {
                        // VERTICAL EDGE
                        el.className = 'edge edge-v';
                        el.dataset.row = r;
                        el.dataset.col = c;
                        el.innerHTML = '<div class="edge-line"></div>';
                        el.onclick = () => onEdgeClick(r, c);

                        const vi = (r - 1) / 2;
                        const vj = c / 2;
                        if (data.vertical_edges[vi] && data.vertical_edges[vi][vj]) {
                            el.classList.add('placed');
                        }
                    } else {
                        // BOX CELL
                        el.className = 'box-cell';
                        el.dataset.boxRow = (r - 1) / 2;
                        el.dataset.boxCol = (c - 1) / 2;

                        const bi = (r - 1) / 2;
                        const bj = (c - 1) / 2;
                        if (data.boxes[bi] && data.boxes[bi][bj] === 1) {
                            el.classList.add('p1-box', 'claimed');
                            el.innerHTML = '<span class="box-label">P1</span>';
                        } else if (data.boxes[bi] && data.boxes[bi][bj] === 2) {
                            el.classList.add('p2-box', 'claimed');
                            el.innerHTML = '<span class="box-label">P2</span>';
                        }
                    }

                    board.appendChild(el);
                }
            }

            // Disable edges if not human's turn
            if (data.current_player !== humanPlayer) {
                disableEdges();
            }
        }

        function buildGridTemplate(boxesCount) {
            const parts = [];
            for (let i = 0; i < 2 * boxesCount + 1; i++) {
                parts.push(i % 2 === 0 ? `${DOT_SIZE}px` : `${CELL_SIZE}px`);
            }
            return parts.join(' ');
        }

        function updateBoard(data) {
            const M = data.board_size[0];
            const N = data.board_size[1];
            const board = document.getElementById('game-board');

            // Remove old last-move highlights
            board.querySelectorAll('.last-move').forEach(e => e.classList.remove('last-move'));

            // Update horizontal edges
            for (let i = 0; i <= M; i++) {
                for (let j = 0; j < N; j++) {
                    const r = i * 2;
                    const c = j * 2 + 1;
                    const el = board.querySelector(`.edge-h[data-row="${r}"][data-col="${c}"]`);
                    if (!el) continue;

                    if (data.horizontal_edges[i] && data.horizontal_edges[i][j]) {
                        if (!el.classList.contains('placed')) {
                            el.classList.add('placed');
                        }
                        // Mark with player color
                        if (data.last_move && data.last_move.row === r && data.last_move.col === c) {
                            el.classList.add('last-move');
                            el.classList.add(data.last_move.player === 1 ? 'p1' : 'p2');
                        }
                    }
                }
            }

            // Update vertical edges
            for (let i = 0; i < M; i++) {
                for (let j = 0; j <= N; j++) {
                    const r = i * 2 + 1;
                    const c = j * 2;
                    const el = board.querySelector(`.edge-v[data-row="${r}"][data-col="${c}"]`);
                    if (!el) continue;

                    if (data.vertical_edges[i] && data.vertical_edges[i][j]) {
                        if (!el.classList.contains('placed')) {
                            el.classList.add('placed');
                        }
                        if (data.last_move && data.last_move.row === r && data.last_move.col === c) {
                            el.classList.add('last-move');
                            el.classList.add(data.last_move.player === 1 ? 'p1' : 'p2');
                        }
                    }
                }
            }

            // Update boxes
            for (let i = 0; i < M; i++) {
                for (let j = 0; j < N; j++) {
                    const el = board.querySelector(`.box-cell[data-box-row="${i}"][data-box-col="${j}"]`);
                    if (!el) continue;

                    if (data.boxes[i] && data.boxes[i][j] === 1 && !el.classList.contains('p1-box')) {
                        el.classList.add('p1-box', 'claimed');
                        el.innerHTML = '<span class="box-label">P1</span>';
                    } else if (data.boxes[i] && data.boxes[i][j] === 2 && !el.classList.contains('p2-box')) {
                        el.classList.add('p2-box', 'claimed');
                        el.innerHTML = '<span class="box-label">P2</span>';
                    }
                }
            }

            // Enable/disable edges based on turn
            if (!data.done && data.current_player === humanPlayer) {
                enableEdges();
            } else {
                disableEdges();
            }
        }

        function enableEdges() {
            document.querySelectorAll('.edge:not(.placed)').forEach(e => {
                e.classList.remove('disabled');
            });
        }

        function disableEdges() {
            document.querySelectorAll('.edge:not(.placed)').forEach(e => {
                e.classList.add('disabled');
            });
        }

        function onEdgeClick(row, col) {
            if (!gameActive) return;
            socket.emit('human_move', { row, col });
        }

        // ──────────────────────────────────────────────
        //  UI UPDATES
        // ──────────────────────────────────────────────
        function updateScores(data) {
            document.getElementById('score-p1').textContent = data.score[0];
            document.getElementById('score-p2').textContent = data.score[1];

            const p1Card = document.getElementById('score-card-p1');
            const p2Card = document.getElementById('score-card-p2');
            p1Card.classList.toggle('active-turn', data.current_player === 1 && !data.done);
            p2Card.classList.toggle('active-turn', data.current_player === 2 && !data.done);
        }

        function updateTurnIndicator(data) {
            const ti = document.getElementById('turn-indicator');
            if (data.done) {
                ti.className = 'turn-indicator game-over-indicator';
                ti.textContent = 'Game Over';
            } else if (data.current_player === humanPlayer) {
                ti.className = 'turn-indicator your-turn';
                ti.textContent = 'Your Turn';
            } else {
                ti.className = 'turn-indicator ai-turn';
                ti.textContent = 'AI Thinking…';
            }
        }

        function addMoveLogEntry(move) {
            if (!move) return;
            const log = document.getElementById('move-log');

            // Remove previous latest
            log.querySelectorAll('.latest').forEach(e => e.classList.remove('latest'));

            const entry = document.createElement('div');
            const isHuman = move.player === humanPlayer;
            const playerLabel = isHuman ? 'You' : 'AI';
            const pClass = move.player === 1 ? 'p1-entry' : 'p2-entry';
            const edgeType = move.action[0] === 0 ? 'H' : 'V';

            let badges = '';
            // check if box was made by score change
            if (move.think_time !== undefined) {
                badges += `<span class="log-badge time-badge">${move.think_time}s</span>`;
            }

            entry.className = `log-entry ${pClass} latest`;
            entry.innerHTML = `
            <span class="log-num">#${moveCount}</span>
            <span class="log-text"><strong>${playerLabel}</strong> → ${edgeType}(${move.action[1]},${move.action[2]})</span>
            ${badges}
        `;

            log.appendChild(entry);
            entry.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function countPlacedEdges(data) {
            let count = 0;
            for (const row of data.horizontal_edges) {
                for (const e of row) { if (e) count++; }
            }
            for (const row of data.vertical_edges) {
                for (const e of row) { if (e) count++; }
            }
            return count;
        }

        // ──────────────────────────────────────────────
        //  TOAST
        // ──────────────────────────────────────────────
        let toastTimer = null;
        function showToast(msg, isError = false) {
            const toast = document.getElementById('status-toast');
            toast.textContent = msg;
            toast.className = 'status-toast show' + (isError ? ' error' : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ──────────────────────────────────────────────
        //  INIT
        // ──────────────────────────────────────────────
        connectSocket();
    </script>
</body>

</html>
